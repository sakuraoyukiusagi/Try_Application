apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: sakuraoyukiusagi/docker-fastapi:latest
          ports:
            - containerPort: 8000
